<!DOCTYPE html>
<html>
<head>
  <title>Smart Complaint Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <h2>Final Test</h2>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      background: rgba(0,0,0,0.2);
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 2.5rem;
    }

    .container {
      background: white;
      color: black;
      max-width: 700px;
      margin: auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #2a5298;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1e3c72;
    }

    .sentiment {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    .card {
      background: #f4f6f9;
      margin-top: 15px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      animation: fadeIn 0.5s ease-in-out;
    }

    .card b {
      color: #2a5298;
    }

    a {
      color: #1e3c72;
      font-weight: bold;
    }

    #loading {
      text-align: center;
      margin-top: 15px;
      display: none;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<header>🚀 Smart Complaint Analyzer</header>

<div class="hero">
  <h1>Analyze Public Complaints Instantly</h1>
  <p>Detect issues, departments, and actions in seconds</p>
</div>

<div class="container">
  <textarea id="complaint" placeholder="Describe your issue..."></textarea>
  <button onclick="analyze()">Analyze Complaint</button>

  <div id="loading">Analyzing...</div>
  <div class="sentiment" id="sentiment"></div>
  <div id="results"></div>
</div>

<footer>
  Made by Supriya 💙
</footer>

<script>
async function analyze() {
  const text = document.getElementById("complaint").value;

  const response = await fetch("https://complaint-analyzer-v5ro.onrender.com/analyze", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text })
  });

  const data = await response.json();

  document.getElementById("loading").style.display = "none";

  document.getElementById("sentiment").innerText =
    "Sentiment: " + data.sentiment;

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  data.issues.forEach(issue => {
    resultsDiv.innerHTML += `
      <div class="card">
        <p><b>Category:</b> ${issue.category}</p>
        <p><b>Subcategory:</b> ${issue.subcategory}</p>
        <p><b>Department:</b> ${issue.department}</p>
        <p><b>Action:</b> ${issue.action}</p>
        <p>🔗 <a href="${issue.portal}" target="_blank">Visit Portal</a></p>
      </div>
    `;
  });
}
</script>

</body>
</html>
