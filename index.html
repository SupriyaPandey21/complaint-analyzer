<!DOCTYPE html>
<html>
<head>
  <title>Smart Complaint Analyzer</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      color: black;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 2.5rem;
    }

    .container {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 15px;
      width: 60%;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    textarea {
      width: 90%;
      height: 120px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #667eea;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    .card {
      background: #f9f9f9;
      margin-top: 15px;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      animation: fadeIn 0.5s ease-in-out;
    }

    a {
      color: #667eea;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .sentiment {
      font-size: 20px;
      margin-top: 20px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<h1> Smart Complaint Analyzer</h1>

<div class="container">
  <textarea id="complaint" placeholder="Describe your issue..."></textarea><br>
  <button onclick="analyze()">Analyze Complaint</button>

  <div class="sentiment" id="sentiment"></div>
  <div id="results"></div>
</div>

<script>
async function analyze() {
  const text = document.getElementById("complaint").value;

  const response = await fetch("https://complaint-analyzer-v5ro.onrender.com/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  });

  const data = await response.json();

  document.getElementById("sentiment").innerText =
    "Sentiment: " + data.sentiment;

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  data.issues.forEach(issue => {
    resultsDiv.innerHTML += `
      <div class="card">
        <p><b>Category:</b> ${issue.category}</p>
        <p><b>Subcategory:</b> ${issue.subcategory}</p>
        <p><b>Department:</b> ${issue.department}</p>
        <p><b>Action:</b> ${issue.action}</p>
        <p>🔗 <a href="${issue.portal}" target="_blank">Visit Portal</a></p>
      </div>
    `;
  });
}
</script>

</body>
</html>
